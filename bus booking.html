
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Bus Booking</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:url("https://images.unsplash.com/photo-1544620347-c4fd4a3d5957?auto=format&fit=crop&w=1600&q=80") no-repeat center center fixed;
    background-size:cover;
    font-family:Arial,sans-serif;
}

/* Navbar */
.navbar{
    background:#0d6efd;
}

.navbar-brand{
    font-size:24px;
    font-weight:bold;
}

.nav-link{
    color:#fff !important;
    margin:0 8px;
    padding:8px 15px;
    border-radius:5px;
    transition:.3s;
}

.nav-link:hover,
.nav-link.active{
    background:#fff;
    color:#0d6efd !important;
}

/* Hero */
.hero{
    background:rgba(13,110,253,.75);
    color:#fff;
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:42px;
    font-weight:bold;
}

.hero p{
    font-size:20px;
}

.booking-box{
    background: rgba(255,255,255,0.95);
    width: 100%;
    max-width: 600px;      
    padding: 20px;         
    margin: 25px auto;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,.3);

}

.booking-box h3{
    font-weight:bold;
}

label{
    font-weight:600;
    margin-bottom:5px;
}

.form-control,
.form-select{
    height:45px;
}

.btn-primary{
    height:40px;
    font-size:16px;
}

/* Footer */
footer{
    background:#0d6efd;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}

/* Mobile Responsive */
@media(max-width:768px){

.hero{
    padding:40px 15px;
}

.hero h1{
    font-size:28px;
}

.hero p{
    font-size:16px;
}

.booking-box{
    margin:20px 10px;
    padding:20px;
}

.nav-link{
    margin:5px 0;
    text-align:center;
}

.btn-primary{
    margin-top:10px;
}

}

@media(max-width:576px){

.hero h1{
    font-size:24px;
}

.hero p{
    font-size:15px;
}

.navbar-brand{
    font-size:20px;
}

.booking-box{
    padding:15px;
}

}
</style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">

<div class="container">

<a class="navbar-brand text-white" href="#">BusBook</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link active" href="#">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Booking</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Contact</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- Hero Section -->
<div class="hero">
<h1>Online Bus Ticket Booking</h1>
<p>Book Your Bus Ticket Easily</p>
</div>

<!-- Booking Form -->
<div class="container d-flex justify-content-center">

<div class="booking-box">

<h3 class="text-center mb-3">Book Your Ticket</h3>

<div class="row">

<div class="col-md-6 mb-2">
<label>Name</label>
<input type="text" id="name" class="form-control" placeholder="Enter Name">
</div>

<div class="col-md-6 mb-2">
<label>From</label>
<input type="text" id="from" class="form-control" placeholder="From City">
</div>

<div class="col-md-6 mb-2">
<label>To</label>
<input type="text" id="to" class="form-control" placeholder="To City">
</div>

<div class="col-md-6 mb-2">
<label>Journey Date</label>
<input type="date" id="date" class="form-control">
</div>

<div class="col-md-6 mb-2">
<label>Seat Number</label>
<select id="seat" class="form-select">
<option>Select Seat</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>
</div>

<div class="col-lg-6 col-md-6 col-12 d-flex align-items-end">
<button class="btn btn-primary w-100" onclick="bookTicket()">
Book Ticket
</button>
</div>

</div>

</div>

</div>

<!-- Footer -->
<footer>
© 2026 BusBook | Online Bus Booking
</footer>

<script>
// Active Navbar
const links = document.querySelectorAll(".nav-link");

links.forEach(link => {
    link.addEventListener("click", function () {
        links.forEach(item => item.classList.remove("active"));
        this.classList.add("active");
    });
});

// Booking Function
function bookTicket(){

    let name = document.getElementById("name").value;
    let from = document.getElementById("from").value;
    let to = document.getElementById("to").value;
    let date = document.getElementById("date").value;
    let seat = document.getElementById("seat").value;

    if(name=="" || from=="" || to=="" || date=="" || seat=="Select Seat"){
        alert("Please fill all details.");
        return;
    }

    alert(
        "Ticket Booked Successfully!\n\n"+
        "Name: "+name+
        "\nFrom: "+from+
        "\nTo: "+to+
        "\nDate: "+date+
        "\nSeat No: "+seat
    );
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
