<!DOCTYPE html>
<html>

<body>

    <script>
        let fruit = "Apple";

        switch (fruit) {
            case "Apple":
                document.write("This is Apple");
                break;

            case "Mango":
                document.write("This is Mango");
                break;

            case "Banana":
                document.write("This is Banana");
                break;

            default:
                document.write("Fruit not found");
        }

    </script>

</body>

</html>
