<!DOCTYPE html>
<html>

<body>

    <script>
        let n = 2;

        switch (n) {
            case 1:
                document.write("One");
                break;

            case 2:
                document.write("Two");
                break;

            case 3:
                document.write("Three");
                break;

            default:
                document.write("Wrong Number");
        }

    </script>

</body>

</html>
